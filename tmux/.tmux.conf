# ~/.tmux.conf

# --- Prefix: Ctrl-b -> Ctrl-Space ---------------------------------------
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# --- Numbering: start windows and panes at 1 ----------------------------
set -g base-index 1
setw -g pane-base-index 1

# --- Renumber windows sequentially when one is closed -------------------
set -g renumber-windows on

# --- Vim-style pane navigation ------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Arrow keys resize the pane -----------------------------------------
# hjkl already MOVES focus, so the arrows RESIZE instead -- no overlap.
# -r = repeatable: after the first prefix, keep tapping arrows for ~500ms
# without pressing prefix again (see `repeat-time`). 5 cells per tap.
# Direction is "which edge moves": Left shrinks the right border leftwards,
# so a pane on the left gets narrower and its neighbour gets wider.
bind -r Left  resize-pane -L 5
bind -r Down  resize-pane -D 5
bind -r Up    resize-pane -U 5
bind -r Right resize-pane -R 5

# --- Memorable split keys (open in current pane's directory) ------------
# \  = side-by-side, -  = stacked
unbind '"'
unbind %
bind '\' split-window -h -c "#{pane_current_path}"
bind -   split-window -v -c "#{pane_current_path}"

# --- Cheat sheet popup --------------------------------------------------
# prefix + g  ("guide") -> float the cheat sheet over your work in nvim (editable).
# -E closes the popup when nvim exits (:q). Adjust -w/-h to resize.
bind g display-popup -E -w 80% -h 80% "nvim ~/dotfiles/cheatsheet.md"

# --- Mouse + scrollback -------------------------------------------------
set -g mouse on
set -g history-limit 50000

# --- Copy mode: vim keys ------------------------------------------------
# Scroll Claude's (or any pane's) output like vim: prefix + [ to ENTER copy
# mode, then C-u / C-d half-page, C-b / C-f full page, k/j, g/G, `/` search.
# q or <Esc> exits. (Without this, copy mode uses emacs keys and C-u/C-d
# don't scroll.)
setw -g mode-keys vi

# --- Animated half-page scroll in copy mode (experimental) --------------
# tmux has no native smooth scroll, so fake it: step ONE line at a time
# (scroll-up/down) with a fixed tiny delay. Fixed delay = constant speed =
# LINEAR profile; small delay = fast. N = half the pane height (so it still
# means "half page", just animated). run-shell -b runs async so the server
# isn't blocked. Caveat: forks a process per line, so it's a touch janky
# next to a native animation. Delete these two lines to get instant back.
bind -T copy-mode-vi C-d run-shell -b 'n=$(( #{pane_height} / 2 )); i=0; while [ $i -lt $n ]; do tmux send-keys -t #{pane_id} -X scroll-down; i=$((i+1)); sleep 0.001; done'
bind -T copy-mode-vi C-u run-shell -b 'n=$(( #{pane_height} / 2 )); i=0; while [ $i -lt $n ]; do tmux send-keys -t #{pane_id} -X scroll-up;   i=$((i+1)); sleep 0.001; done'

# --- Colours ------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-256color:Tc"

# --- No delay after Escape (important for Neovim) -----------------------
set -sg escape-time 10

# --- Status bar: clean tabs on top --------------------------------------
set -g status on
set -g status-position top
set -g status-justify left
set -g status-style "bg=default,fg=#737aa2"

# Two status lines: line 0 = tabs + date, line 1 = separator rule
set -g status 2

# Left: nothing extra. Right: date + time (like default tmux, top-right now)
set -g status-left ""
set -g status-left-length 0
set -g status-right "#[fg=#7dcfff,bg=default] %H:%M %a %d-%b-%y "
set -g status-right-length 40

# Inactive tabs: muted text, transparent background
setw -g window-status-format "#[fg=#737aa2,bg=default] #I: #W "
setw -g window-status-separator ""

# Current tab: dark text on a yellow highlight (bold)
setw -g window-status-current-format "#[fg=#24283b,bg=#7dcfff,bold] #I: #W "

# Line 1: a thin horizontal rule separating tabs from the content below
set -g status-format[1] "#[fg=#545c7e,bg=default]#[align=left]────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────"
