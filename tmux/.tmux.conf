# ~/.tmux.conf

# --- Prefix: Ctrl-b -> Ctrl-Space ---------------------------------------
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# --- Numbering: start windows and panes at 1 ----------------------------
set -g base-index 1
setw -g pane-base-index 1

# --- Renumber windows sequentially when one is closed -------------------
set -g renumber-windows on

# --- Vim-style pane navigation ------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Memorable split keys (open in current pane's directory) ------------
# \  = side-by-side, -  = stacked
unbind '"'
unbind %
bind '\' split-window -h -c "#{pane_current_path}"
bind -   split-window -v -c "#{pane_current_path}"

# --- Cheat sheet popup --------------------------------------------------
# prefix + g  ("guide") -> float the cheat sheet over your work in nvim (editable).
# -E closes the popup when nvim exits (:q). Adjust -w/-h to resize.
bind g display-popup -E -w 80% -h 80% "nvim ~/dotfiles/cheatsheet.md"

# --- Mouse + scrollback -------------------------------------------------
set -g mouse on
set -g history-limit 50000

# --- Colours ------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-256color:Tc"

# --- No delay after Escape (important for Neovim) -----------------------
set -sg escape-time 10

# --- Status bar: clean tabs on top --------------------------------------
set -g status on
set -g status-position top
set -g status-justify left
set -g status-style "bg=default,fg=#908caa"

# Two status lines: line 0 = tabs + date, line 1 = separator rule
set -g status 2

# Left: nothing extra. Right: date + time (like default tmux, top-right now)
set -g status-left ""
set -g status-left-length 0
set -g status-right "#[fg=#9ccfd8,bg=default] %H:%M %a %d-%b-%y "
set -g status-right-length 40

# Inactive tabs: muted text, transparent background
setw -g window-status-format "#[fg=#908caa,bg=default] #I: #W "
setw -g window-status-separator ""

# Current tab: dark text on a yellow highlight (bold)
setw -g window-status-current-format "#[fg=#232136,bg=#f6c177,bold] #I: #W "

# Line 1: a thin horizontal rule separating tabs from the content below
set -g status-format[1] "#[fg=#56526e,bg=default]#[align=left]────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────"
